packages:
  darwin:
    taps:
      - "lotyp/homebrew-formulae"
    brews:
      - "git"
      # core/dotfiles
      - "neovim"
      - "tmux"
      - "tmuxinator"
      - "coreutils"
      # search/grep/diff
      - "fd"
      - "fzf"
      - "grep"
      - "psgrep"
      - "ripgrep"
      - "gawk"
      - "jq"
      # tooling / source control
      - "gh"
      - "pinentry-mac"
      - "docker-credential-helper"
      - "gnupg"
      - "topgrade"
      - "bitwarden-cli"
    casks:
      - "kitty"
      - "font-inconsolata-nerd-font"
      - "hammerspoon"
      - "karabiner-elements"
      - "shottr"
      - "bitwarden"
  linux:
    apt:
      - "git"
      # core/dotfiles
      - "neovim"
      - "tmux"
      - "coreutils"
      # search/grep/diff
      - "fd-find" # binary is `fdfind`; install script symlinks to `fd`
      - "fzf"
      - "ripgrep"
      - "gawk"
      - "jq"
      # tooling / source control
      - "gnupg"
      - "pinentry-curses"
      # terminal
      - "kitty-terminfo" # so TERM=xterm-kitty resolves over SSH
