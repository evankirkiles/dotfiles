packages:
  darwin:
    taps:
    brews:
      - "git"
      # core/dotfiles
      - "neovim"
      - "tmux"
      - "tmuxinator"
      - "coreutils"
      # search/grep/diff
      - "fd"
      - "fzf"
      - "grep"
      - "psgrep"
      - "ripgrep"
      - "gawk"
      - "jq"
      - "shellcheck" # lints the dotfiles scripts; matches CI
      # tooling / source control
      - "gh"
      - "docker-credential-helper"
      - "topgrade"
      - "bitwarden-cli"
    casks:
      - "kitty"
      - "font-inconsolata-nerd-font"
      - "hammerspoon"
      - "hyperkey"
      - "shottr"
      - "bitwarden"
  linux:
    apt:
      - "git"
      # core/dotfiles
      - "tmux"
      - "tmuxinator"
      - "coreutils"
      - "xclip"
      # search/grep/diff
      - "fd-find" # binary is `fdfind`; install script symlinks to `fd`
      - "fzf"
      - "ripgrep"
      - "gawk"
      - "jq"
      - "shellcheck" # lints the dotfiles scripts; matches CI
      # terminal
      - "kitty-terminfo" # so TERM=xterm-kitty resolves over SSH
      # libraries needed for other things
      - "libclang-dev"
